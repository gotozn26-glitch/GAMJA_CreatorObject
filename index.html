    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --whisk-yellow: #FFD600;
            --whisk-bg: #ECECEC;
            --whisk-black: #000000;
            --whisk-border: rgba(0, 0, 0, 0.1);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--whisk-bg);
            color: var(--whisk-black);
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }
        .whisk-card {
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px dashed var(--whisk-border);
            border-radius: 1.5rem;
            transition: all 0.2s ease;
        }
        .whisk-card:hover {
            border-color: var(--whisk-black);
        }
        .whisk-card.active {
            border-style: solid;
            border-color: var(--whisk-black);
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .style-item.active {
            background-color: var(--whisk-yellow);
            border: 1.5px solid var(--whisk-black);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .generate-btn {
            background: var(--whisk-black);
            color: white;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .generate-btn:hover {
            background: #222;
            transform: translateY(-2px);
        }
        .generate-btn:active {
            transform: translateY(0);
        }
        .object-cover-contain {
            object-fit : contain;
        }
    </style>
